<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsahový Manažer | Autotrio Vícha</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // 1. Injektujeme vlastní brutální design do administrace
    CMS.registerPreviewStyle("admin-styles.css");

    // 2. Upravíme pravý náhledový panel, aby vypadal jako reálná karta článku a ne jako čistý text
    CMS.registerPreviewTemplate("blog", createClass({
      render: function() {
        const entry = this.props.entry;
        const title = entry.getIn(['data', 'title']) || 'Bez názvu';
        const dateRaw = entry.getIn(['data', 'date']);
        const date = dateRaw ? new Date(dateRaw).toLocaleDateString('cs-CZ') : '';
        const description = entry.getIn(['data', 'description']) || '';
        const image = this.props.getAsset(entry.getIn(['data', 'image'])) || '';
        const body = this.props.widgetFor('body');

        return h('div', { style: { padding: '24px', background: '#f8fafc', minHeight: '100vh', fontFamily: 'sans-serif' } },
          // Simulace karty článku
          h('div', { style: { background: '#ffffff', borderRadius: '16px', border: '1px solid #e2e8f0', overflow: 'hidden', maxWidth: '500px', margin: '0 auto 32px auto', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)' } },
            image ? h('img', { src: image.toString(), style: { width: '100%', aspectRatio: '16/9', objectFit: 'cover' } }) : null,
            h('div', { style: { padding: '24px' } },
              h('div', { style: { fontSize: '12px', fontWeight: 'bold', color: '#2563eb', uppercase: true, marginBottom: '8px' } }, date || 'Dnes'),
              h('h3', { style: { fontSize: '20px', fontWeight: '900', color: '#0f172a', margin: '0 0 12px 0' } }, title),
              h('p', { style: { fontSize: '14px', color: '#475569', lineHeight: '1.6', margin: 0 } }, description)
            )
          ),
          h('hr', { style: { border: '0', borderTop: '1px solid #e2e8f0', margin: '32px 0' } }),
          // Samotný text článku
          h('div', { style: { maxWidth: '650px', margin: '0 auto', color: '#334155', lineHeight: '1.7' } },
            h('h1', { style: { fontSize: '28px', fontWeight: '900', color: '#0f172a', marginBottom: '20px' } }, title),
            body
          )
        );
      }
    }));
  </script>
</body>
</html>

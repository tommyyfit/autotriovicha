<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrace Blogu</title>
</head>
<body>
    <script>
        // Úplně přeskočíme nefunkční widget a ověříme uživatele přímo proti Netlify API
        if (sessionStorage.getItem("cms_auth") !== "true") {
            let email = prompt("Zadejte e-mail:");
            let password = prompt("Zadejte heslo:");

            // Tady se posílá požadavek přímo na tvůj Netlify Identity server
            fetch("https://lucent-ganache-d3e692.netlify.app/.netlify/identity/token", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `grant_type=password&username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            })
            .then(res => {
                if (res.ok) {
                    return res.json();
                }
                throw new Error();
            })
            .then(data => {
                // Heslo je správné, uložíme token do paměti pro Decap CMS
                localStorage.setItem("netlify-cms-user", JSON.stringify({ backendName: "git-gateway", token: data.access_token }));
                sessionStorage.setItem("cms_auth", "true");
                window.location.reload();
            })
            .catch(() => {
                alert("Nesprávný e-mail nebo heslo!");
                window.location.href = "/";
            });
        }
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
